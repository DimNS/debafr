[app]
project_name = "myapp"
proxy_pass_prefix = "proxy_pass http://127.0.0.1:"
location_ports = [
    {location = "/api", blue_port = "3001", green_port = "3011"},
    {location = "/ws",  blue_port = "3003", green_port = "3013"},
    {location = "/",    blue_port = "3002", green_port = "3012"},
]

[docker_login]
enabled = true
registry = "ghcr.io"
username = "username2"
password = "password2"

[files]
compose_blue = "myapp_compose.blue.yaml"
compose_green = "myapp_compose.green.yaml"
nginx_conf = "myapp_nginx.conf"

[binpaths]
docker = "docker"
curl = "curl"
nginx = "nginx"

[timeouts]
default = "60s"

[healthcheck]
max_retries = 5
retry_delay = "5s"
